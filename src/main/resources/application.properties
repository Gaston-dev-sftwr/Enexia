spring.application.name=eventos

# GENERAL
server.port=8081

# CONEXION A MYSQL XAMPP
spring.datasource.url=jdbc:mysql://localhost:3306/enexia?useSSL=false&serverTimezone=America/Argentina/Buenos_Aires
spring.datasource.username=root
spring.datasource.password=

server.tomcat.relaxed-query-characters=|<>[]{}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#
# JPA/Hibernate Settings
spring.jpa.hibernate.ddl-auto=create
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ====================================================================================
# CONFIGURACIÓN DE TIEMPO DE VIDA DE LA SESIÓN
# ====================================================================================

# Establece la duración máxima de la sesión a 5 minutos de inactividad.
# El formato acepta minutos ('m'), segundos ('s'), u horas ('h').
server.servlet.session.timeout=30m


#spring.security.user.name=miusuario
#spring.security.user.password=miclave



# ====================================================================================
# CONFIGURACIÓN DE CORREO (GMAIL REAL)
# ====================================================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=enexia.soporte@gmail.com
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Tiempo de espera para evitar que la app se cuelgue si Gmail tarda
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000


####

# Para probar en tu PC hoy
app.base-url=http://localhost:8081


