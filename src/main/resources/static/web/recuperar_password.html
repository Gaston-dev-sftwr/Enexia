<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Enexia - Recuperar Acceso</title>
    <style>
        /* Estilos base Enexia Dark */
        body {
            background-color: #0f0f0f;
            color: #f0f0f0;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #1a1a1a;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 380px;
            text-align: center;
            border: 1px solid #333;
        }
        h2 { color: #4facfe; margin-bottom: 10px; }
        p { color: #aaa; font-size: 0.9em; margin-bottom: 25px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #444;
            background: #252525;
            color: white;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border-radius: 6px;
            border: none;
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { opacity: 0.9; transform: scale(1.02); }
    </style>
</head>
<body>
<div class="card">
    <h2>¿Olvidaste tu clave?</h2>
    <p>Ingresá tu correo y te enviaremos un link de recuperación.</p>

    <input type="email" id="emailInput" placeholder="ejemplo@correo.com">
    <button onclick="solicitarLink()">Enviar correo</button>

    <div id="mensaje" style="margin-top: 15px; font-size: 0.85em;"></div>
</div>

<script>
    function solicitarLink() {
        const email = document.getElementById('emailInput').value;
        const msgDiv = document.getElementById('mensaje');

        if (!email.includes("@")) {
            msgDiv.innerText = "Por favor, ingresá un correo válido.";
            msgDiv.style.color = "#ff4d4d";
            return;
        }

        msgDiv.innerText = "Procesando...";
        msgDiv.style.color = "#4facfe";

        // Llamada al endpoint de recuperación que creamos antes
        fetch(`/api/auth/recuperar-password?email=${email}`, { method: 'POST' })
        .then(res => {
            if (res.ok) {
                msgDiv.innerText = "¡Listo! Revisá tu bandeja de Mailtrap.";
                msgDiv.style.color = "#00ff88";
            } else {
                res.text().then(text => {
                    msgDiv.innerText = "Error: " + text;
                    msgDiv.style.color = "#ff4d4d";
                });
            }
        })
        .catch(() => {
            msgDiv.innerText = "Error de conexión con el servidor.";
            msgDiv.style.color = "#ff4d4d";
        });
    }
</script>
</body>
</html>
