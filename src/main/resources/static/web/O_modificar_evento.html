<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modificar Evento</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    
    <link rel="stylesheet" href="css/styles.css"> 
    <link rel="stylesheet" href="css/O_modificar_evento.css"> 
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    
    <header class="header-minimal">
        <h1 class="header-title">Modificar Evento</h1>
        <a href="O_mis_eventos.html" class="btn btn-primary">
            <i class="fas fa-arrow-left"></i> Volver a Mis Eventos
        </a>
    </header>

    <main class="container" id="modifyEventApp">
        <div class="row justify-content-center">
            <div class="col-lg-10 col-md-10">
                <div class="form-wrapper-card">
                    
                    <p v-if="loadingMsg" class="text-center" style="color: var(--color-text-secondary);">
                        {{ loadingMsg }}
                    </p>

                    <form @submit.prevent="handleUpdateEvent" v-if="!loadingMsg">
                        <div class="form-group mb-3">
                            <label for="nombre" class="form-label">Nombre del Evento</label>
                            <input type="text" class="form-control" id="nombre" required v-model="nombre">
                        </div>
                        <div class="form-group mb-3">
                            <label for="categoria" class="form-label">Categoría</label>
                            <input type="text" class="form-control" id="categoria" required v-model="categoria">
                        </div>
                        
                        <div class="row mb-3">
                            <div class="col-md-4 form-group">
                                <label for="fechaInicio" class="form-label">Fecha de Inicio</label>
                                <input type="text" class="form-control" id="fechaInicio" required v-model="fechaInicio" placeholder="Seleccionar fecha...">
                            </div>
                            <div class="col-md-4 form-group">
                                <label for="fechaFin" class="form-label">Fecha de Fin</label>
                                <input type="text" class="form-control" id="fechaFin" v-model="fechaFin" placeholder="Seleccionar fecha...">
                            </div>
                            <div class="col-md-4 form-group">
                                <label for="hora" class="form-label">Hora (0-23)</label>
                                <input type="number" class="form-control" id="hora" min="0" max="23" required v-model="hora">
                            </div>
                        </div>
                        
                        <div class="form-group mb-3">
                            <label for="direccion" class="form-label">Dirección</label>
                            <input type="text" class="form-control" id="direccion" required v-model="direccion">
                        </div>
                        <div class="form-group mb-4">
                            <label for="descripcion" class="form-label">Descripción</label>
                            <textarea class="form-control textarea" id="descripcion" rows="5" required v-model="descripcion"></textarea>
                        </div>
                        
                        <p v-if="errorMsg" :class="{'msg-success': isSuccess, 'msg-error': !isSuccess}" class="form-message text-center mb-3">
                            {{ errorMsg }}
                        </p>
                        
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="fas fa-save"></i> Guardar Cambios
                        </button>
                    </form>

                </div>
            </div>
        </div>
    </main>
    
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    
    <script src="js/modificar_evento.js"></script> 
</body>
</html>
