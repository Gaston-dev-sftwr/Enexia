<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Enexia - Nueva Contraseña</title>
    <style>
        /* Reutilizamos los mismos estilos para mantener la consistencia UI */
        body { background-color: #0f0f0f; color: #f0f0f0; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background-color: #1a1a1a; padding: 40px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); width: 100%; max-width: 380px; text-align: center; border: 1px solid #333; }
        h2 { color: #4facfe; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #444; background: #252525; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 20px; border-radius: 6px; border: none; background: linear-gradient(45deg, #4facfe, #00f2fe); color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div class="card">
    <h2>Restablecer Clave</h2>
    <input type="password" id="pass1" placeholder="Nueva contraseña">
    <input type="password" id="pass2" placeholder="Confirmar contraseña">

    <button onclick="confirmarCambio()">Actualizar Contraseña</button>
    <div id="status" style="margin-top: 15px;"></div>
</div>

<script>
    // Capturamos el token del link que llegó a Mailtrap
    const urlParams = new URLSearchParams(window.location.search);
    const tokenValido = urlParams.get('token');

    function confirmarCambio() {
        const p1 = document.getElementById('pass1').value;
        const p2 = document.getElementById('pass2').value;
        const status = document.getElementById('status');

        if (p1 !== p2) {
            status.innerText = "Las contraseñas no coinciden.";
            status.style.color = "#ff4d4d";
            return;
        }

        // Llamamos al backend (donde ya pusimos el ValidadorPassword)
        fetch(`/api/auth/cambiar-password?token=${tokenValido}&nuevaPassword=${p1}`, { method: 'POST' })
        .then(res => {
            if (res.ok) {
                alert("¡Contraseña actualizada! Ya podés loguearte.");
                window.location.href = "login.html";
            } else {
                res.text().then(msg => {
                    status.innerText = msg;
                    status.style.color = "#ff4d4d";
                });
            }
        });
    }
</script>
</body>
</html>
