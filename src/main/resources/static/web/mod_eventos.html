<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Enexia | Eventos Disponibles</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="css/mod_base_participante.css">
</head>
<body>
<div id="app" v-cloak>
    <nav class="navbar navbar-expand-lg fixed-top navbar-dark bg-dark shadow">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold text-primary" href="#">ENEXIA</a>
            <div class="collapse navbar-collapse justify-content-end">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link active" href="mod_eventos.html">Cartelera</a></li>
                    <li class="nav-item"><a class="nav-link" href="mod_historial.html">Mis Inscripciones</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" @click.prevent="cerrarSesion">Salir</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="header-container">
            <h1 class="main-title">Eventos Disponibles</h1>
        </div>

        <div class="row row-cols-1 row-cols-md-3 g-4">
            <div class="col" v-for="evento in events" :key="evento.id">
                <div class="card h-100 card-event-static shadow">
                    <img :src="evento.urlImagen || 'https://via.placeholder.com/400x250'" class="card-img-top">
                    <div class="card-body text-center">
                        <h4 class="fw-bold mb-2">{{ evento.nombre }}</h4>
                        <p class="text-muted">Organizado por: <br><strong>{{ evento.nombreOrganizador }}</strong></p>
                    </div>
                    <div class="card-footer bg-transparent border-0 pb-3">
                        <a :href="'evento_detalle.html?id=' + evento.id" class="btn btn-ver-detalles w-100">Ver Detalles</a>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="js/mod_participante.js"></script>
</body>
</html>
