<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enexia | Mis Inscripciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="css/mod_base_participante.css">
    <style> [v-cloak] { display: none; } </style>
</head>
<body>

<div id="app" v-cloak>
    <nav class="navbar navbar-expand-lg fixed-top navbar-dark bg-dark shadow">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold text-primary" href="mod_eventos.html">ENEXIA</a>
            <div class="collapse navbar-collapse justify-content-end">
                <ul class="navbar-nav">
                    <li class="nav-item me-2"><a class="nav-link" href="mod_eventos.html">Cartelera</a></li>
                    <li class="nav-item"><a class="nav-link active" href="mod_historial.html">Mis Inscripciones</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" @click.prevent="cerrarSesion">Salir</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="header-container">
            <h1 class="main-title">Mis Inscripciones</h1>
            <p class="text-muted">Eventos donde tienes un lugar asegurado</p>
        </div>

        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4 justify-content-center">

            <div v-if="historial.length === 0" class="col-12 text-center py-5">
                <h3 class="text-muted">Aún no tienes inscripciones.</h3>
                <a href="mod_eventos.html" class="btn btn-ver-detalles mt-3">Ver Eventos</a>
            </div>

            <div class="col" v-for="insc in historial" :key="insc.id">
                <div class="card h-100 card-event-static">
                    <img :src="insc.urlImagenEvento || 'https://via.placeholder.com/400x250'" class="card-img-top" style="opacity: 0.8;">

                    <div class="card-body text-center p-4">
                        <div class="badge bg-success mb-3">CONFIRMADO</div>
                        <h4 class="fw-bold text-white mb-2">{{ insc.eventoNombre }}</h4>
                        <p class="small text-muted mb-0">
                            <i class="fas fa-calendar-alt me-2"></i> Inscrito el: {{ insc.fechaInscripcion }}
                        </p>
                    </div>

                    <div class="card-footer bg-transparent border-0 pb-4 px-4">
                        <button class="btn btn-danger w-100 fw-bold py-2" @click="cancelarInscripcion(insc)">
                            CANCELAR MI LUGAR
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="js/mod_participante.js"></script>
</body>
</html>
