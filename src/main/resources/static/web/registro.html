<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario - Enexia</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/registro_organizador.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="register-card" id="app">

    <div class="register-icon">
        <i class="fas fa-user-plus"></i>
    </div>

    <h2 class="text-center" style="font-size: 1.8rem; font-weight: 600; margin-bottom: 25px;">
        Crear Nueva Cuenta
    </h2>

    <form @submit.prevent="handleRegister">

        <div class="form-group mb-3">
            <label for="rol" class="form-label">¿Qué tipo de usuario eres?</label>
            <select class="form-select" id="rol" v-model="rol" required
                    style="background-color: var(--color-bg-input); border: 1px solid var(--color-border); color: white;">
                <option value="" disabled>Selecciona tu perfil...</option>
                <option value="PARTICIPANTE">Participante</option>
                <option value="ORGANIZADOR">Organizador</option>
            </select>
        </div>

        <div class="row">
            <div class="col-md-6 form-group mb-3">
                <label for="nombre" class="form-label">Nombre</label>
                <input type="text" class="form-control" id="nombre" placeholder="Ej: Juan" required v-model="nombre">
            </div>
            <div class="col-md-6 form-group mb-3">
                <label for="apellido" class="form-label">Apellido</label>
                <input type="text" class="form-control" id="apellido" placeholder="Ej: Pérez" required v-model="apellido">
            </div>
        </div>

        <div class="form-group mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" placeholder="email@ejemplo.com" required v-model="email">
        </div>

        <div class="form-group mb-4">
            <label for="password" class="form-label">Contraseña</label>
            <input type="password" class="form-control" id="password" placeholder="••••••••" required v-model="password">
            <small class="text-muted" style="font-size: 0.75rem;">
                Mín. 8 caracteres, una mayúscula, un número y un símbolo.
            </small>
        </div>

        <button type="submit" class="btn btn-primary w-100 mb-4" :disabled="loading">
            <i v-if="loading" class="fas fa-spinner fa-spin me-2"></i>
            {{ loading ? 'Creando cuenta...' : 'Registrarse' }}
        </button>
    </form>

    <p v-if="errorMsg"
       :class="{'msg-success': isSuccess, 'msg-error': !isSuccess}"
       class="form-message text-center mt-3 mb-1">
        {{ errorMsg }}
    </p>

    <p class="text-center mt-3 mb-1" style="font-size: 0.9em; color: var(--color-text-secondary);">
        ¿Ya tienes una cuenta?
    </p>
    <p class="text-center mb-0">
        <a @click.prevent="goToLogin" href="#" class="btn-link-custom">Iniciar Sesión aquí</a>
    </p>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="js/login.js"></script>
</body>
</html>
