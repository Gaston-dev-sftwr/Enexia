<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    
    <link rel="stylesheet" href="css/styles.css"> 
    
    <link rel="stylesheet" href="css/login.css"> 
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="login-body">
    
    <div class="login-card" id="app"> 
        <div class="login-icon">
            <i class="fas fa-user"></i>
        </div>

        <form @submit.prevent="handleLogin"> 
            
            <div class="form-group mb-4">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" placeholder="email@ejemplo.com" required v-model="email">
            </div>
            
            <div class="form-group mb-3">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="password" placeholder="••••••••" required v-model="password">
            </div>

            <div class="login-footer">
                <a href="recuperar_password.html" style="color: #4facfe; text-decoration: none; font-size: 0.85em;">
                    ¿Olvidaste tu contraseña?
                </a>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 mt-3">
                Iniciar Sesión
            </button>
        </form>

        <p v-if="errorMsg" class="login-error">
            {{ errorMsg }}
        </p>

        <p class="text-center mt-4 mb-1" style="font-size: 0.9em; color: var(--color-text-secondary);">
            ¿No tenés cuenta?
        </p>
        <p class="text-center mb-0">
             <a @click.prevent="goToRegister" href="#" class="btn-link-custom">Regístrate aquí</a>
        </p>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/web/js/login.js"></script> 
</body>
</html>
